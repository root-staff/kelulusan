<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pengumuman Kelulusan - SMP Negeri 3 Pekanbaru</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 0; text-align: center; }
    header { background: #1d4ed8; color: white; padding: 20px; }
    header img { height: 80px; margin-bottom: 10px; }
    main { padding: 30px 20px; }
    
    /* Timer Style */
    #timer-container { 
      background: white; 
      padding: 20px; 
      border-radius: 12px; 
      display: inline-block; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-top: 20px;
    }
    .timer-unit { display: inline-block; margin: 0 10px; font-size: 28px; font-weight: bold; color: #1d4ed8; }
    .timer-label { display: block; font-size: 12px; color: #666; text-transform: uppercase; }
    
    /* Form Style */
    input[type="text"] { padding: 12px; width: 200px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 12px 24px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .hidden { display: none !important; }
    
    .result { margin-top: 30px; font-size: 18px; }
    .lulus { color: green; font-weight: bold; animation: blink 1s infinite; }
    .tidaklulus { color: red; font-weight: bold; }
    footer { margin-top: 50px; padding: 20px; background: #e2e8f0; color: #444; font-size: 13px; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

  <header>
    <img src="https://raw.githubusercontent.com/efendibinselim/PENGUMUMAN-KELULUSAN/refs/heads/main/logosmpn3pku%20png.png" alt="Logo">
    <h1>Pengumuman Kelulusan</h1>
    <h2>SMP Negeri 3 Pekanbaru <br> TP 2025/2026</h2>
  </header>

  <main>
    <div id="timer-container">
      <p id="timer-status">Menunggu Waktu Pengumuman:</p>
      <div class="timer-unit"><span id="days">00</span><span class="timer-label">Hari</span></div>
      <div class="timer-unit"><span id="hours">00</span><span class="timer-label">Jam</span></div>
      <div class="timer-unit"><span id="minutes">00</span><span class="timer-label">Menit</span></div>
      <div class="timer-unit"><span id="seconds">00</span><span class="timer-label">Detik</span></div>
    </div>

    <div id="form-kelulusan" class="hidden">
      <p>Silakan masukkan NISN Anda:</p>
      <input type="text" id="nisnInput" placeholder="Contoh: 0081234567">
      <button onclick="cekKelulusan()">LIHAT HASIL</button>
    </div>

    <div id="hasil" class="result"></div>
  </main>

  <footer>
    &copy; 2026 SMP Negeri 3 Pekanbaru - Jl. Dahlia No. 102
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    // --- 1. SETING WAKTU TARGET ---
    // Pastikan formatnya benar: TAHUN-BULAN-TANGGAL T JAM:MENIT:DETIK+07:00
    const targetWaktu = new Date("2026-06-10T10:00:00+07:00").getTime();

    function updateTimer() {
      const sekarang = new Date().getTime();
      const selisih = targetWaktu - sekarang;

      if (selisih <= 0) {
        // Jika waktu sudah habis/lewat
        document.getElementById("timer-container").classList.add("hidden");
        document.getElementById("form-kelulusan").classList.remove("hidden");
        return;
      }

      // Hitung angka
      const d = Math.floor(selisih / (1000 * 60 * 60 * 24));
      const h = Math.floor((selisih % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((selisih % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((selisih % (1000 * 60)) / 1000);

      // Tampilkan ke layar
      document.getElementById("days").innerText = String(d).padStart(2, '0');
      document.getElementById("hours").innerText = String(h).padStart(2, '0');
      document.getElementById("minutes").innerText = String(m).padStart(2, '0');
      document.getElementById("seconds").innerText = String(s).padStart(2, '0');
    }

    // Jalankan timer tiap 1 detik
    setInterval(updateTimer, 1000);
    updateTimer(); // Jalankan sekali di awal agar tidak delay 1 detik

    // --- 2. LOGIKA DATA SISWA ---
    const urlDatabase = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTlOAf-YkKZAjTd7dpK49JinaQyppe3GWonVcKqewsJxboPYAOkqT2QG9-HOgx8hDs0DItwRHCA6w24/pub?output=csv";
    let listSiswa = [];

    fetch(urlDatabase)
      .then(res => res.text())
      .then(csv => {
        const baris = csv.split('\n').slice(1);
        listSiswa = baris.map(item => {
          const kolom = item.split(',');
          return {
            nisn: kolom[1]?.trim(),
            nama: kolom[2],
            tempat: kolom[3],
            tanggal: kolom[4],
            status: kolom[5]?.trim()
          };
        });
      });

    function cekKelulusan() {
      const inputVal = document.getElementById("nisnInput").value.trim();
      const display = document.getElementById("hasil");
      
      if (!inputVal) {
        display.innerHTML = "Isi NISN dulu ya.";
        return;
      }

      const mhs = listSiswa.find(s => s.nisn === inputVal);

      if (mhs) {
        if (mhs.status.toUpperCase() === "LULUS") {
          display.innerHTML = `<h3>${mhs.nama}</h3><p class="lulus">SELAMAT! ANDA LULUS</p>`;
          confetti(); // Efek cepat
        } else {
          display.innerHTML = `<h3>${mhs.nama}</h3><p class="tidaklulus">MAAF, BELUM LULUS</p>`;
        }
      } else {
        display.innerHTML = "Data tidak ditemukan. Cek lagi NISN Anda.";
      }
    }
  </script>
</body>
</html>
